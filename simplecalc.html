<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <title>Document</title>
    <style>
        body{
            background-color: rgba(0, 0, 0, 0.83);
        }
         .input{
            margin-top: 12px;
            

            
         }
          .values{
              padding: 40px 4px 4px 200px;
              text-align: right;
              background-color: rgba(0, 0, 0, 0.338);
              color:white;
              font-weight: 70%;
              font-size: 30px;
              border-radius: 10px;
                border-color: white;
                border-style: solid;
                box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.568);
          }
          .components{
            height: 400px;
            width:546px;
            background-color: rgba(0, 0, 0, 0.337); 
            border-radius: 10px;
            box-shadow: 2px 2px 2px rgba(0, 0, 0, 0.568);
          }
          .operators{
            padding: 15px;
            padding-left: 28px ;
            padding-right: 28px;
            border-radius: 40px;
            font-size:xx-large;
            height: 70px;
            width:120px;
            text-align: center;
             border: none;
            background-color: rgb(66, 68, 77);
            color: white;
            margin-right: 4px;
            margin-left:4px ;
            margin-bottom: 4px;
            margin-top: 4px;
          
           
          }
           .operators:active{
                   box-shadow: 2px 2px 4px #080808c8;
           }
          #opbtn{
               background-color: rgb(44, 48, 61);
          }
          .calculator{
                margin-left: 380px;
                margin-top: 200px;
                margin-bottom: 40px;
          }
          table{
            margin-left: 8px;
          }
          
          h1{
            padding: 10px;
            padding-left: 50px;
            color: rgb(29, 31, 43);
            font-weight: bold;
          }
    </style>
       
         
</head>
<body>
    
    <div class="calculator">
        <h1>Simple Calculator</h1>
   <div class="input">
      <input class="values"type="text"  id="input" readonly>
   </div>
   <div class="components">
         <table>
           <tr >
            <td>
               <button class="operators" onclick="appendvalues('(')">(</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues(')')"  >)</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues('%')" >%</button>
            </td>
            <td>
               <button class="operators" onclick="cleardisplay()" >AC</button>
            </td>
           </tr>
           <tr>
            <td>
                <button className="1" class="operators" onclick="appendvalues('1')" >1</button>
          
          
            </td>
            <td>
                <button class="operators" onclick="appendvalues('2')" >2</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues('3')" >3</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues('+')" >+</button>
            </td>
           </tr>
           <tr>
            <td>
                 <button class="operators" onclick="appendvalues('4')" >4</button>
          
          
            </td>
            <td>
                <button class="operators" onclick="appendvalues('5')" >5</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues('6')" >6</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues('-')" >-</button>
            </td>
           </tr>
           <tr>
            <td>
                <button class="operators" onclick="appendvalues('7')" >7</button>
          
          
            </td>
            <td>
                <button class="operators" onclick="appendvalues('8')" >8</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues('9')" >9</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues('*')" >x</button>
            </td>
           </tr>
           <tr>
            
            <td>
                <button class="operators" onclick="appendvalues('0')" >0</button>
            </td>
            <td>
                <button class="operators" onclick="appendvalues('.')" >.</button>
            </td>
            <td>
                 <button class="operators" onclick="calculate()" >=</button>
            </td>
            <td>
               <button class="operators" onclick="appendvalues('/')" >/</button> 
            </td>
           </tr>
         </table>        
         
   </div>
   </div>
        <script>
            let display=document.getElementById("input")

            function appendvalues(value){
                display.value += value
            }
            function cleardisplay(){
                display.value ="";
            }

            function calculate(){
                try{
                display.value=eval(display.value)
                }
                catch(Error){
                      display.value="Error"
                }
            }



        </script>
</body>
</html>
